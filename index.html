<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>
body{
font-family:Arial;
background:#f3f4f6;
margin:0;
text-align:center;
}

#qr-reader{
width:320px;
margin:auto;
}
   

.box{padding:20px}

.counter{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

.btn{
padding:10px 15px;
margin:5px;
border:none;
background:#111827;
color:white;
border-radius:6px;
cursor:pointer;
}

.alert{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111827;
color:#fff;
padding:15px 25px;
border-radius:8px;
display:none;
z-index:999;
}
</style>
</head>

<body>

<div class="box">

<div class="counter">
Đã quét: <span id="count">0</span>
</div>

<div id="qr-reader"></div>

<br>

<button class="btn" onclick="forceSync()">☁️ SYNC NOW</button>
<button class="btn" onclick="clearLocal()">🗑 CLEAR LOCAL</button>

</div>

<div id="alert" class="alert"></div>

<script>

/* =========================
   ✅ THAY WEB APP URL
========================= */

const API_URL =
"https://script.google.com/macros/s/AKfycbwQ7yG6AxLf8n9rblCVYfhuMIV5HQGWNk86FcacbYnyvlzwJFGFIBytNWwfteZ2p-qH/exec";

/* =========================
   LOCAL DATABASE
========================= */

let queue = JSON.parse(localStorage.getItem("qr_queue") || "[]");
let scanned = new Set(queue.map(x => x.qr));

updateCounter();

/* =========================
   SCAN SUCCESS
========================= */

function onScanSuccess(text){

text = text.trim();

if(scanned.has(text)){
show("⚠️ Mã đã quét");
return;
}

const item={
time:new Date().toLocaleString("vi-VN"),
qr:text,
synced:false
};

queue.push(item);
scanned.add(text);

saveLocal();
updateCounter();

show("✅ "+text);

}

/* =========================
   START CAMERA
========================= */

const scanner = new Html5QrcodeScanner(
"qr-reader",
{
fps:15,
qrbox:{width:250,height:250},
rememberLastUsedCamera:true
});

scanner.render(onScanSuccess);

/* =========================
   LOCAL STORAGE
========================= */

function saveLocal(){
localStorage.setItem("qr_queue",JSON.stringify(queue));
}

function updateCounter(){
document.getElementById("count").innerText = queue.length;
}

/* =========================
   SYNC TO GOOGLE SHEET
========================= */

async function sync(){

const unsynced = queue.filter(x=>!x.synced);

if(!unsynced.length) return;

try{

show("☁️ Đang sync...");

const res = await fetch(API_URL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action:"save",
data:unsynced
})
});

const result = await res.json();

if(result.status==="success"){

queue.forEach(x=>x.synced=true);
saveLocal();

show("✅ Sync thành công");

}else{
show("❌ Sheet từ chối");
}

}catch(e){
console.log(e);
show("📡 Offline");
}

}

/* AUTO SYNC 10s */
setInterval(sync,10000);

/* =========================
   BUTTONS
========================= */

function forceSync(){
sync();
}

function clearLocal(){

if(!confirm("Xóa toàn bộ dữ liệu local?")) return;

queue=[];
scanned.clear();

saveLocal();
updateCounter();

show("🗑 Đã xóa");
}

/* =========================
   ALERT
========================= */

function show(msg){
const el=document.getElementById("alert");
el.innerText=msg;
el.style.display="block";
setTimeout(()=>el.style.display="none",1500);
}

</script>

</body>
</html>
